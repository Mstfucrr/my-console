include:
  - project: 'fiyuu_devops/DevopStation'
    ref: main
    file: '/pipelines/ci/templates/gemini-review.yml'

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      variables:
        ENVIRONMENT: 'prod'
        S3_BUCKET: $S3_BUCKET_PROD
        CLOUDFRONT_DIST_ID: $CLOUDFRONT_DIST_ID_PROD
        NEXT_PUBLIC_API_BASE_URL: $NEXT_PUBLIC_API_BASE_URL_PROD
        NEXT_PUBLIC_TURNSTILE_SITEKEY: $NEXT_PUBLIC_TURNSTILE_SITEKEY_PROD
        NEXT_PUBLIC_TURNSTILE_ACTIVE: $NEXT_PUBLIC_TURNSTILE_ACTIVE_PROD
        NEXT_PUBLIC_POSTHOG_KEY: $NEXT_PUBLIC_POSTHOG_KEY_PROD
        NEXT_PUBLIC_POSTHOG_HOST: $NEXT_PUBLIC_POSTHOG_HOST_PROD
        NEXT_PUBLIC_INSTANA_REPORTING_URL: $NEXT_PUBLIC_INSTANA_REPORTING_URL_PROD
        NEXT_PUBLIC_INSTANA_KEY: $NEXT_PUBLIC_INSTANA_KEY_PROD
        NEXT_PUBLIC_INSTANA_EUM_SRC: $NEXT_PUBLIC_INSTANA_EUM_SRC_PROD
        NEXT_PUBLIC_INSTANA_EUM_INTEGRITY: $NEXT_PUBLIC_INSTANA_EUM_INTEGRITY_PROD
        NEXT_PUBLIC_ALOTECH_WIDGET_KEY: $NEXT_PUBLIC_ALOTECH_WIDGET_KEY_PROD
        NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC: $NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC_PROD
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-prep(\.\d+)?$/'
      variables:
        ENVIRONMENT: 'preprod'
        S3_BUCKET: $S3_BUCKET_PREPROD
        CLOUDFRONT_DIST_ID: $CLOUDFRONT_DIST_ID_PREPROD
        NEXT_PUBLIC_API_BASE_URL: $NEXT_PUBLIC_API_BASE_URL_PREPROD
        NEXT_PUBLIC_TURNSTILE_SITEKEY: $NEXT_PUBLIC_TURNSTILE_SITEKEY_PREPROD
        NEXT_PUBLIC_TURNSTILE_ACTIVE: $NEXT_PUBLIC_TURNSTILE_ACTIVE_PREPROD
        NEXT_PUBLIC_POSTHOG_KEY: $NEXT_PUBLIC_POSTHOG_KEY_PREPROD
        NEXT_PUBLIC_POSTHOG_HOST: $NEXT_PUBLIC_POSTHOG_HOST_PREPROD
        NEXT_PUBLIC_INSTANA_REPORTING_URL: $NEXT_PUBLIC_INSTANA_REPORTING_URL_PREPROD
        NEXT_PUBLIC_INSTANA_KEY: $NEXT_PUBLIC_INSTANA_KEY_PREPROD
        NEXT_PUBLIC_INSTANA_EUM_SRC: $NEXT_PUBLIC_INSTANA_EUM_SRC_PREPROD
        NEXT_PUBLIC_INSTANA_EUM_INTEGRITY: $NEXT_PUBLIC_INSTANA_EUM_INTEGRITY_PREPROD
        NEXT_PUBLIC_ALOTECH_WIDGET_KEY: $NEXT_PUBLIC_ALOTECH_WIDGET_KEY_PREPROD
        NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC: $NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC_PREPROD
    - if: '$CI_COMMIT_BRANCH != "preprod" && $CI_COMMIT_BRANCH != "main"'
      variables:
        ENVIRONMENT: 'dev'
        S3_BUCKET: $S3_BUCKET_DEV
        CLOUDFRONT_DIST_ID: $CLOUDFRONT_DIST_ID_DEV
        NEXT_PUBLIC_API_BASE_URL: $NEXT_PUBLIC_API_BASE_URL_DEV
        NEXT_PUBLIC_TURNSTILE_SITEKEY: $NEXT_PUBLIC_TURNSTILE_SITEKEY_DEV
        NEXT_PUBLIC_TURNSTILE_ACTIVE: $NEXT_PUBLIC_TURNSTILE_ACTIVE_DEV
        NEXT_PUBLIC_POSTHOG_KEY: $NEXT_PUBLIC_POSTHOG_KEY_DEV
        NEXT_PUBLIC_POSTHOG_HOST: $NEXT_PUBLIC_POSTHOG_HOST_DEV
        NEXT_PUBLIC_INSTANA_REPORTING_URL: $NEXT_PUBLIC_INSTANA_REPORTING_URL_DEV
        NEXT_PUBLIC_INSTANA_KEY: $NEXT_PUBLIC_INSTANA_KEY_DEV
        NEXT_PUBLIC_INSTANA_EUM_SRC: $NEXT_PUBLIC_INSTANA_EUM_SRC_DEV
        NEXT_PUBLIC_INSTANA_EUM_INTEGRITY: $NEXT_PUBLIC_INSTANA_EUM_INTEGRITY_DEV
        NEXT_PUBLIC_ALOTECH_WIDGET_KEY: $NEXT_PUBLIC_ALOTECH_WIDGET_KEY_DEV
        NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC: $NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC_DEV

stages:
  - gemini-review
  - syntax-check
  - build
  - deploy

start_ai_review:
  extends: .gemini-review

syntax-check:
  stage: syntax-check
  image: node:22.21.1-alpine
  before_script:
    - npm install -g pnpm
  script:
    - pnpm install --no-strict-peer-dependencies
    - pnpm lint
    - pnpm prettier-check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - when: manual

node-build:
  stage: build
  image: node:22.21.1-alpine
  before_script:
    - echo "🚀 Building for $ENVIRONMENT environment"
    - apk add --no-cache figlet
    - figlet "Fiyuu Partner Build"
    - npm install -g pnpm
    - |
      cat > .env.$ENVIRONMENT << EOF
      NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL
      NEXT_PUBLIC_TURNSTILE_SITEKEY=$NEXT_PUBLIC_TURNSTILE_SITEKEY
      NEXT_PUBLIC_TURNSTILE_ACTIVE=$NEXT_PUBLIC_TURNSTILE_ACTIVE
      NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
      NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
      NEXT_PUBLIC_INSTANA_REPORTING_URL=$NEXT_PUBLIC_INSTANA_REPORTING_URL
      NEXT_PUBLIC_INSTANA_KEY=$NEXT_PUBLIC_INSTANA_KEY
      NEXT_PUBLIC_INSTANA_EUM_SRC=$NEXT_PUBLIC_INSTANA_EUM_SRC
      NEXT_PUBLIC_INSTANA_EUM_INTEGRITY=$NEXT_PUBLIC_INSTANA_EUM_INTEGRITY
      NEXT_PUBLIC_ALOTECH_WIDGET_KEY=$NEXT_PUBLIC_ALOTECH_WIDGET_KEY
      NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC=$NEXT_PUBLIC_ALOTECH_CLICK2CONNECT_SRC
      NEXT_PUBLIC_APP_VERSION=$CI_COMMIT_TAG
      EOF
  script:
    - pnpm install --no-strict-peer-dependencies
    - pnpm install env-cmd --save-dev
    - |
      if [ "$ENVIRONMENT" = "prod" ]; then
        pnpm build
      elif [ "$ENVIRONMENT" = "preprod" ]; then
        pnpm build:preprod
      else
        pnpm build:dev
      fi
  artifacts:
    paths:
      - out/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - when: manual

deploy:
  stage: deploy
  image: node:22.21.1-alpine
  needs:
    - job: node-build
      artifacts: true
  before_script:
    - apk update
    - apk add --no-cache aws-cli
    - aws --version
  script:
    - aws s3 sync out/ $S3_BUCKET
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID --paths '/*'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "preprod"'
      when: on_success
    - when: manual
      allow_failure: true